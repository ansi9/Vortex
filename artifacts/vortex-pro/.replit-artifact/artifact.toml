kind = "web"
previewPath = "/"
title = "Vortex Pro — Safe Transit"
version = "1.0.0"
id = "artifacts/vortex-pro"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18130

[services.development]
run = "pnpm --filter @workspace/vortex-pro run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vortex-pro", "run", "build" ]
serve = "static"
publicDir = "artifacts/vortex-pro/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18130"
BASE_PATH = "/"
